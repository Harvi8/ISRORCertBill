name: Build compact release

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: Runtime identifier to publish.
        required: true
        default: win-x64
        type: choice
        options:
          - win-x64
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: compact-release
  cancel-in-progress: false

jobs:
  build-release:
    name: Build compact self-contained release
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve release settings
        id: settings
        run: |
          $runtime = "${{ github.event.inputs.runtime }}"
          if ([string]::IsNullOrWhiteSpace($runtime)) {
            $runtime = "win-x64"
          }

          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $releaseTag = $env:GITHUB_REF_NAME
          }
          else {
            git fetch --tags --force

            $versions = git tag --list "v[0-9]*.[0-9]" |
              ForEach-Object {
                if ($_ -match '^v(?<major>\d+)\.(?<minor>\d)$') {
                  [pscustomobject]@{
                    Tag = $_
                    Major = [int]$Matches.major
                    Minor = [int]$Matches.minor
                    Sort = ([int]$Matches.major * 10) + [int]$Matches.minor
                  }
                }
              } |
              Sort-Object Sort -Descending

            if (-not $versions) {
              $nextMajor = 0
              $nextMinor = 1
            }
            else {
              $latest = $versions | Select-Object -First 1
              $nextMajor = $latest.Major
              $nextMinor = $latest.Minor + 1
              if ($nextMinor -gt 9) {
                $nextMajor += 1
                $nextMinor = 0
              }
            }

            $releaseTag = "v$nextMajor.$nextMinor"
          }

          $publishPath = "artifacts/publish/$runtime"
          $releasePath = "artifacts/release"
          $zipName = "ISRORUnified-$releaseTag-$runtime.zip"
          $zipPath = Join-Path $releasePath $zipName

          "runtime=$runtime" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "publish_path=$publishPath" >> $env:GITHUB_OUTPUT
          "release_path=$releasePath" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/ISRORUnified/ISRORUnified.csproj

      - name: Publish compact self-contained app
        run: |
          ./scripts/Publish.ps1 `
            -ProjectPath src/ISRORUnified/ISRORUnified.csproj `
            -Configuration Release `
            -Runtime "${{ steps.settings.outputs.runtime }}" `
            -OutputPath "${{ steps.settings.outputs.publish_path }}" `
            -SelfContained `
            -OverwriteAppSettings `
            -ReleaseZip `
            -ReleasePath "${{ steps.settings.outputs.release_path }}" `
            -ReleaseFileName "${{ steps.settings.outputs.zip_name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.settings.outputs.zip_name }}
          path: ${{ steps.settings.outputs.zip_path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.settings.outputs.release_tag }}"
          $zipPath = "${{ steps.settings.outputs.zip_path }}"
          $releaseNotes = "Compact self-contained Windows release."

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipPath --clobber
          }
          elseif ($env:GITHUB_REF -like "refs/tags/v*") {
            gh release create $tag $zipPath --title "ISRORUnified $tag" --notes $releaseNotes
          }
          else {
            gh release create $tag $zipPath --target $env:GITHUB_SHA --title "ISRORUnified $tag" --notes $releaseNotes
          }
